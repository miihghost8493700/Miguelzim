<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Digital - Jogos</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:linear-gradient(135deg,#cfe9ff,#a6d4fa);
  color:#1e2a38;
}

header{
  background:#8ec5f5;
  padding:15px;
  text-align:center;
  font-size:22px;
  color:#0a2540;
}

#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

input,textarea{
  padding:8px;
  border-radius:6px;
  border:none;
  margin:4px;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#5aa9e6;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#3d8ed1;
}

#app{
  display:none;
}

nav{
  text-align:center;
  margin:10px;
}

nav button{
  margin:4px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
  padding:20px;
}

.materia{
  background:#e3f2fd;
  border-radius:10px;
  padding:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.conteudo{
  background:#d4ecff;
  padding:6px 8px;
  border-radius:6px;
  margin-top:6px;
  font-size:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

.conteudo span{
  flex:1;
}

.section{
  display:none;
  padding:20px;
  text-align:center;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  z-index:999;
  left:0;
  top:0;
  width:100%;
  height:100%;
  overflow:auto;
  background-color:rgba(0,0,0,0.5);
}

.modal-content {
  background:#e3f2fd;
  margin:10% auto;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:500px;
  color:#1e2a38;
}

.modal-content textarea{
  width:100%;
  height:150px;
  resize:vertical;
}

.modal-buttons{
  margin-top:10px;
  text-align:right;
}

.modal-buttons button{
  margin-left:6px;
}

/* JOGOS */
.jogo-card{
  background:#d4ecff;
  padding:15px;
  border-radius:10px;
  margin:10px;
  box-shadow:0 3px 6px rgba(0,0,0,0.2);
  transition:0.2s;
}

.jogo-card:hover{
  transform:scale(1.03);
}

.jogo-card a{
  color:#1e2a38;
  text-decoration:none;
  font-weight:bold;
}

</style>
</head>

<body>

<div id="login">
<h2>🔒 Mochila Digital</h2>
<input type="password" id="senha">
<button onclick="entrar()">Entrar</button>
<p id="erro"></p>
</div>

<div id="app">

<header>🎒 Mochila Escolar</header>

<nav>
<button onclick="mostrar('mochila')">📚 Mochila</button>
<button onclick="mostrar('provas')">📅 Provas</button>
<button onclick="mostrar('notas')">📊 Notas</button>
<button onclick="mostrar('arquivos')">📂 Arquivos</button>
<button onclick="mostrar('jogos')">🎮 Jogos</button>
</nav>

<!-- MOCHILA -->
<div id="mochila" class="section">
<input id="pesquisa" placeholder="Pesquisar matéria..." onkeyup="buscar()">
<br><br>
<input id="novaMateria" placeholder="Nome da nova matéria">
<button onclick="criarMateria()">Adicionar Matéria</button>
<div class="grid" id="grid"></div>
</div>

<!-- PROVAS -->
<div id="provas" class="section">
<h2>Calendário de Provas</h2>
<input type="date" id="dataProva">
<input placeholder="Matéria" id="materiaProva">
<button onclick="addProva()">Adicionar</button>
<ul id="listaProvas"></ul>
</div>

<!-- NOTAS -->
<div id="notas" class="section">
<h2>Gráfico de Notas</h2>
<input id="nota" placeholder="Digite nota">
<button onclick="addNota()">Adicionar</button>
<canvas id="grafico" width="400" height="200"></canvas>
</div>

<!-- ARQUIVOS -->
<div id="arquivos" class="section">
<h2>Arquivos</h2>
<input type="file" id="fileInput">
<ul id="listaArquivos"></ul>
</div>

<!-- JOGOS -->
<div id="jogos" class="section">
<h2>🎮 Plataformas de Jogos</h2>
<div class="grid" id="gridJogos">
  <div class="jogo-card"><a href="https://www.friv.com/" target="_blank">FRIV</a></div>
  <div class="jogo-card"><a href="https://www.crazygames.com/" target="_blank">Crazy Games</a></div>
  <div class="jogo-card"><a href="https://poki.com/" target="_blank">Poki</a></div>
  <div class="jogo-card"><a href="https://www.miniclip.com/games/en/" target="_blank">Miniclip</a></div>
</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <textarea id="modalText"></textarea>
    <div class="modal-buttons">
      <button onclick="fecharModal()">Salvar</button>
      <button onclick="excluirModal()">❌ Excluir</button>
    </div>
  </div>
</div>

</div>

<script>

/* LOGIN */
let senhaCorreta="244m"
function entrar(){
  if(senha.value===senhaCorreta){
    login.style.display="none"
    app.style.display="block"
    mostrar("mochila")
  }else{
    erro.innerText="Senha incorreta"
  }
}

/* NAVEGAÇÃO */
function mostrar(sec){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none")
  document.getElementById(sec).style.display="block"
}

/* MATÉRIAS */
let grid=document.getElementById("grid")
let totalMaterias=parseInt(localStorage.getItem("totalMaterias")||21)
for(let i=1;i<=totalMaterias;i++){
  criarMateriaHTML(i)
}

function criarMateriaHTML(i){
  let nome=localStorage.getItem("nome"+i)||("Matéria "+i)
  let div=document.createElement("div")
  div.className="materia"
  div.innerHTML=`
    <h3 contenteditable oninput="salvarNome(${i},this)">${nome}</h3>
    <button onclick="addConteudo(${i})">➕ Adicionar conteúdo</button>
    <div id="conteudos${i}"></div>
  `
  grid.appendChild(div)
  renderConteudos(i)
}

/* CONTEÚDOS - MODO MODAL */
let modal=document.getElementById("modal")
let modalText=document.getElementById("modalText")
let modalMateria=0
let modalIndex=0

function renderConteudos(i){
  let container=document.getElementById("conteudos"+i)
  container.innerHTML=""
  let lista=JSON.parse(localStorage.getItem("conteudos"+i)||"[]")
  lista.forEach((texto,index)=>{
    let div=document.createElement("div")
    div.className="conteudo"
    let preview = texto.length>40?texto.substring(0,40)+"...":texto||"Novo conteúdo..."
    div.innerHTML=`
      <span onclick="abrirModal(${i},${index})">${preview}</span>
      <button onclick="removerConteudo(${i},${index})">❌</button>
    `
    container.appendChild(div)
  })
}

function addConteudo(i){
  let lista=JSON.parse(localStorage.getItem("conteudos"+i)||"[]")
  lista.push("")
  localStorage.setItem("conteudos"+i,JSON.stringify(lista))
  renderConteudos(i)
}

function abrirModal(i,index){
  modalMateria=i
  modalIndex=index
  let lista=JSON.parse(localStorage.getItem("conteudos"+i)||"[]")
  modalText.value=lista[index]
  modal.style.display="block"
}

function fecharModal(){
  let lista=JSON.parse(localStorage.getItem("conteudos"+modalMateria)||"[]")
  lista[modalIndex]=modalText.value
  localStorage.setItem("conteudos"+modalMateria,JSON.stringify(lista))
  modal.style.display="none"
  renderConteudos(modalMateria)
}

function excluirModal(){
  let lista=JSON.parse(localStorage.getItem("conteudos"+modalMateria)||"[]")
  lista.splice(modalIndex,1)
  localStorage.setItem("conteudos"+modalMateria,JSON.stringify(lista))
  modal.style.display="none"
  renderConteudos(modalMateria)
}

/* SALVAR NOME */
function salvarNome(i,e){
  localStorage.setItem("nome"+i,e.innerText)
}

/* NOVA MATÉRIA */
function criarMateria(){
  let nome=novaMateria.value.trim()
  if(nome==="") return
  totalMaterias++
  localStorage.setItem("totalMaterias",totalMaterias)
  localStorage.setItem("nome"+totalMaterias,nome)
  criarMateriaHTML(totalMaterias)
  novaMateria.value=""
}

/* PESQUISA */
function buscar(){
  let termo=pesquisa.value.toLowerCase()
  document.querySelectorAll(".materia").forEach(m=>{
    let nome=m.querySelector("h3").innerText.toLowerCase()
    m.style.display=nome.includes(termo)?"block":"none"
  })
}

/* PROVAS */
function addProva(){
  if(!dataProva.value||!materiaProva.value) return
  let li=document.createElement("li")
  li.innerText=dataProva.value+" - "+materiaProva.value
  listaProvas.appendChild(li)
}

/* NOTAS */
let notas=[]
let ctx=grafico.getContext("2d")
function addNota(){
  let n=parseFloat(nota.value)
  if(isNaN(n)) return
  notas.push(n)
  ctx.clearRect(0,0,400,200)
  notas.forEach((n,i)=>{
    ctx.fillStyle="blue"
    ctx.fillRect(i*40+20,200-n*15,30,n*15)
  })
}

/* ARQUIVOS */
fileInput.addEventListener("change",function(){
  let file=this.files[0]
  if(!file) return
  let li=document.createElement("li")
  li.innerText=file.name
  listaArquivos.appendChild(li)
})

</script>
</body>
</html>
