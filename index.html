<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Digital - Completo</title>

<style>
body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#cfe9ff,#a6d4fa);
color:#1e2a38;
}

header{
background:#8ec5f5;
padding:15px;
text-align:center;
font-size:22px;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

input,textarea{
padding:8px;
border-radius:6px;
border:none;
margin:4px;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#5aa9e6;
color:white;
cursor:pointer;
}

button:hover{background:#3d8ed1;}

#app{display:none;}

nav{text-align:center;margin:10px;}
nav button{margin:4px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
padding:20px;
}

.materia{
background:#e3f2fd;
border-radius:10px;
padding:12px;
}

.conteudo{
background:#d4ecff;
padding:6px;
margin-top:6px;
display:flex;
justify-content:space-between;
}

.section{display:none;padding:20px;text-align:center;}

/* HORÁRIO */
.tabela{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
margin-bottom:20px;
}

.celula{
background:#d4ecff;
padding:10px;
border-radius:6px;
min-height:40px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:#e3f2fd;
margin:10% auto;
padding:20px;
width:90%;
max-width:500px;
border-radius:10px;
}

canvas{
background:white;
border-radius:10px;
}

</style>
</head>

<body>

<div id="login">
<h2>🔒 Mochila Digital</h2>
<input type="password" id="senha">
<button onclick="entrar()">Entrar</button>
<p id="erro"></p>
</div>

<div id="app">

<header>🎒 Mochila Escolar</header>

<nav>
<button onclick="mostrar('mochila')">📚 Mochila</button>
<button onclick="mostrar('horario')">📅 Horário</button>
<button onclick="mostrar('provas')">📅 Provas</button>
<button onclick="mostrar('notas')">📊 Notas</button>
<button onclick="mostrar('arquivos')">📂 Arquivos</button>
<button onclick="mostrar('jogos')">🎮 Jogos</button>
</nav>

<!-- MOCHILA -->
<div id="mochila" class="section">
<input id="pesquisa" placeholder="Pesquisar matéria..." onkeyup="buscar()">
<br><br>
<input id="novaMateria" placeholder="Nome da nova matéria">
<button onclick="criarMateria()">Adicionar</button>
<div class="grid" id="grid"></div>
</div>

<!-- HORÁRIO -->
<div id="horario" class="section">
<h2>📅 Horário Escolar</h2>

<h3>🌅 Manhã (5 aulas)</h3>
<div id="manha" class="tabela"></div>

<h3>🌇 Tarde (4 aulas)</h3>
<div id="tarde" class="tabela"></div>
</div>

<!-- PROVAS -->
<div id="provas" class="section">
<input type="date" id="dataProva">
<input id="materiaProva" placeholder="Matéria">
<button onclick="addProva()">Adicionar</button>
<ul id="listaProvas"></ul>
</div>

<!-- NOTAS -->
<div id="notas" class="section">
<input id="nota" placeholder="Digite nota">
<button onclick="addNota()">Adicionar</button>
<canvas id="grafico" width="400" height="200"></canvas>
</div>

<!-- JOGOS -->
<div id="jogos" class="section">
<div><a href="https://www.friv.com" target="_blank">FRIV</a></div>
<div><a href="https://poki.com" target="_blank">Poki</a></div>
<div><a href="https://crazygames.com" target="_blank">Crazy Games</a></div>
</div>

<!-- ARQUIVOS -->
<div id="arquivos" class="section">
<input type="file" id="fileInput">
<ul id="listaArquivos"></ul>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<textarea id="modalText"></textarea><br>
<button onclick="salvarModal()">Salvar</button>
<button onclick="excluirModal()">Excluir</button>
</div>
</div>

</div>

<script>

/* LOGIN */
let senhaCorreta="244m"
function entrar(){
if(senha.value===senhaCorreta){
login.style.display="none"
app.style.display="block"
mostrar("mochila")
}else{
erro.innerText="Senha incorreta"
}
}

/* NAV */
function mostrar(s){
document.querySelectorAll(".section").forEach(e=>e.style.display="none")
document.getElementById(s).style.display="block"
}

/* HORÁRIO */
let dias=["Seg","Ter","Qua","Qui","Sex"]

function criarTabela(id,linhas){
let div=document.getElementById(id)
div.innerHTML=""

dias.forEach(d=>div.innerHTML+=`<div class="celula"><b>${d}</b></div>`)

for(let i=1;i<=linhas;i++){
dias.forEach((d,j)=>{
let key=id+i+j
let val=localStorage.getItem(key)||""
div.innerHTML+=`<div contenteditable class="celula"
oninput="localStorage.setItem('${key}',this.innerText)">${val}</div>`
})
}
}

criarTabela("manha",5)
criarTabela("tarde",4)

/* NOTAS PROFISSIONAL */
let notas=[]
let ctx=grafico.getContext("2d")

function addNota(){
let n=parseFloat(nota.value)
if(isNaN(n))return
notas.push(n)
desenhar()
}

function desenhar(){
ctx.clearRect(0,0,400,200)

/* linhas */
for(let i=0;i<=10;i++){
let y=200-i*20
ctx.fillStyle="#ccc"
ctx.fillRect(0,y,400,1)
ctx.fillStyle="#000"
ctx.fillText(i,5,y-2)
}

/* barras */
notas.forEach((n,i)=>{
let x=i*40+30
let h=n*15
ctx.fillStyle="#5aa9e6"
ctx.fillRect(x,200-h,30,h)
ctx.fillStyle="#000"
ctx.fillText(n,x,200-h-5)
})
}

/* RESTANTE DO SEU CÓDIGO (mantido) */

let grid=document.getElementById("grid")
let totalMaterias=parseInt(localStorage.getItem("totalMaterias")||21)

for(let i=1;i<=totalMaterias;i++) criarMateriaHTML(i)

function criarMateriaHTML(i){
let nome=localStorage.getItem("nome"+i)||("Matéria "+i)
let div=document.createElement("div")
div.className="materia"
div.innerHTML=`
<h3 contenteditable oninput="salvarNome(${i},this)">${nome}</h3>
<button onclick="addConteudo(${i})">➕</button>
<div id="conteudos${i}"></div>`
grid.appendChild(div)
renderConteudos(i)
}

let modal=document.getElementById("modal")
let modalText=document.getElementById("modalText")
let modalMateria=0
let modalIndex=0

function renderConteudos(i){
let c=document.getElementById("conteudos"+i)
c.innerHTML=""
let lista=JSON.parse(localStorage.getItem("conteudos"+i)||"[]")
lista.forEach((t,idx)=>{
let d=document.createElement("div")
d.className="conteudo"
d.innerHTML=`<span onclick="abrirModal(${i},${idx})">${t.substring(0,20)}</span>
<button onclick="removerConteudo(${i},${idx})">x</button>`
c.appendChild(d)
})
}

function addConteudo(i){
let l=JSON.parse(localStorage.getItem("conteudos"+i)||"[]")
l.push("")
localStorage.setItem("conteudos"+i,JSON.stringify(l))
renderConteudos(i)
}

function abrirModal(i,j){
modalMateria=i
modalIndex=j
let l=JSON.parse(localStorage.getItem("conteudos"+i)||"[]")
modalText.value=l[j]
modal.style.display="block"
}

function salvarModal(){
let l=JSON.parse(localStorage.getItem("conteudos"+modalMateria)||"[]")
l[modalIndex]=modalText.value
localStorage.setItem("conteudos"+modalMateria,JSON.stringify(l))
modal.style.display="none"
renderConteudos(modalMateria)
}

function excluirModal(){
removerConteudo(modalMateria,modalIndex)
modal.style.display="none"
}

function removerConteudo(i,j){
let l=JSON.parse(localStorage.getItem("conteudos"+i)||"[]")
l.splice(j,1)
localStorage.setItem("conteudos"+i,JSON.stringify(l))
renderConteudos(i)
}

function salvarNome(i,e){
localStorage.setItem("nome"+i,e.innerText)
}

function criarMateria(){
let nome=novaMateria.value.trim()
if(nome==="")return
totalMaterias++
localStorage.setItem("totalMaterias",totalMaterias)
localStorage.setItem("nome"+totalMaterias,nome)
criarMateriaHTML(totalMaterias)
novaMateria.value=""
}

function buscar(){
let t=pesquisa.value.toLowerCase()
document.querySelectorAll(".materia").forEach(m=>{
let n=m.querySelector("h3").innerText.toLowerCase()
m.style.display=n.includes(t)?"block":"none"
})
}

function addProva(){
let li=document.createElement("li")
li.innerText=dataProva.value+" - "+materiaProva.value
listaProvas.appendChild(li)
}

fileInput.onchange=()=>{
let li=document.createElement("li")
li.innerText=fileInput.files[0].name
listaArquivos.appendChild(li)
}

</script>

</body>
</html>
