<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Digital PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
display:flex;
background:#eef5ff;
color:#1e2a38;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#5aa9e6;
height:100vh;
padding:20px;
color:white;
position:fixed;
}

.sidebar h2{margin-bottom:20px;}

.sidebar button{
display:block;
width:100%;
margin:8px 0;
padding:10px;
border:none;
border-radius:8px;
background:#ffffff22;
color:white;
cursor:pointer;
}

.sidebar button:hover{background:#ffffff44}

/* MAIN */
.main{
margin-left:220px;
padding:20px;
width:100%;
}

/* SEÇÕES */
.section{display:none}

/* CARDS */
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:15px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

/* BOTÕES */
button{
background:#5aa9e6;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

button:hover{background:#3d8ed1}

input,textarea{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
margin:5px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:500px;
margin:10% auto;
}

.modal textarea{
width:100%;
height:150px;
}

/* HORÁRIO PROFISSIONAL */
.tabela{
display:grid;
grid-template-columns:80px repeat(5,1fr);
gap:6px;
justify-content:center;
margin:20px auto;
max-width:700px;
}

.celula{
background:white;
padding:10px;
border-radius:8px;
min-height:50px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
border:1px solid #ddd;
}

.header{
font-weight:bold;
background:#5aa9e6;
color:white;
}

/* JOGOS */
.jogo{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
transition:0.2s;
}

.jogo:hover{transform:scale(1.05)}

canvas{
background:white;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🎒 Mochila</h2>
<button onclick="mostrar('mochila')">📚 Mochila</button>
<button onclick="mostrar('horario')">📅 Horário</button>
<button onclick="mostrar('notas')">📊 Notas</button>
<button onclick="mostrar('provas')">📅 Provas</button>
<button onclick="mostrar('jogos')">🎮 Jogos</button>
<button onclick="mostrar('arquivos')">📂 Arquivos</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- MOCHILA -->
<div id="mochila" class="section">
<div class="card">
<input id="novaMateria" placeholder="Nova matéria">
<button onclick="criarMateria()">Adicionar</button>
</div>
<div class="grid" id="grid"></div>
</div>

<!-- HORÁRIO -->
<div id="horario" class="section">

<div class="card">
<h3>🌅 Manhã</h3>
<div id="manha" class="tabela"></div>
</div>

<div class="card">
<h3>🌇 Tarde</h3>
<div id="tarde" class="tabela"></div>
</div>

</div>

<!-- NOTAS -->
<div id="notas" class="section">
<div class="card">
<input id="nota">
<button onclick="addNota()">Adicionar</button>
<canvas id="grafico" width="500" height="250"></canvas>
</div>
</div>

<!-- PROVAS -->
<div id="provas" class="section">
<div class="card">
<input type="date" id="dataProva">
<input id="materiaProva">
<button onclick="addProva()">Adicionar</button>
<ul id="listaProvas"></ul>
</div>
</div>

<!-- JOGOS -->
<div id="jogos" class="section">
<div class="grid">
<div class="jogo"><a href="https://www.friv.com" target="_blank">FRIV</a></div>
<div class="jogo"><a href="https://poki.com" target="_blank">Poki</a></div>
<div class="jogo"><a href="https://crazygames.com" target="_blank">Crazy Games</a></div>
</div>
</div>

<!-- ARQUIVOS -->
<div id="arquivos" class="section">
<div class="card">
<input type="file" id="fileInput">
<ul id="listaArquivos"></ul>
</div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<textarea id="modalText"></textarea><br>
<button onclick="salvarModal()">Salvar</button>
<button onclick="excluirModal()">Excluir</button>
</div>
</div>

<script>

/* NAV */
function mostrar(s){
document.querySelectorAll(".section").forEach(e=>e.style.display="none")
document.getElementById(s).style.display="block"
}
mostrar("mochila")

/* MOCHILA */
let grid=document.getElementById("grid")
let total=parseInt(localStorage.getItem("total")||5)

for(let i=1;i<=total;i++) criar(i)

function criar(i){
let nome=localStorage.getItem("nome"+i)||"Matéria"
let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<h3 contenteditable oninput="localStorage.setItem('nome${i}',this.innerText)">${nome}</h3>
<button onclick="add(${i})">+ Conteúdo</button>
<div id="c${i}"></div>
`

grid.appendChild(div)
render(i)
}

function render(i){
let lista=JSON.parse(localStorage.getItem("c"+i)||"[]")
let c=document.getElementById("c"+i)
c.innerHTML=""
lista.forEach((t,idx)=>{
c.innerHTML+=`<div onclick="abrir(${i},${idx})">${t.substring(0,20)}</div>`
})
}

function add(i){
let l=JSON.parse(localStorage.getItem("c"+i)||"[]")
l.push("")
localStorage.setItem("c"+i,JSON.stringify(l))
render(i)
}

/* MODAL */
let mat,idx
function abrir(i,j){
mat=i;idx=j
modalText.value=JSON.parse(localStorage.getItem("c"+i))[j]
modal.style.display="block"
}

function salvarModal(){
let l=JSON.parse(localStorage.getItem("c"+mat))
l[idx]=modalText.value
localStorage.setItem("c"+mat,JSON.stringify(l))
modal.style.display="none"
render(mat)
}

function excluirModal(){
let l=JSON.parse(localStorage.getItem("c"+mat))
l.splice(idx,1)
localStorage.setItem("c"+mat,JSON.stringify(l))
modal.style.display="none"
render(mat)
}

/* HORÁRIO PROFISSIONAL */
let dias=["Seg","Ter","Qua","Qui","Sex"]

function tabela(id,linhas){

let div=document.getElementById(id)
div.innerHTML=""

/* cabeçalho */
div.innerHTML+=`<div class="celula header"></div>`
dias.forEach(d=>{
div.innerHTML+=`<div class="celula header">${d}</div>`
})

/* aulas */
for(let i=1;i<=linhas;i++){

div.innerHTML+=`<div class="celula header">Aula ${i}</div>`

dias.forEach((d,j)=>{
let key=id+i+j
let val=localStorage.getItem(key)||""

div.innerHTML+=`
<div contenteditable class="celula"
oninput="localStorage.setItem('${key}',this.innerText)">
${val}
</div>
`
})

}

}

tabela("manha",5)
tabela("tarde",4)

/* NOTAS */
let notas=[]
let ctx=grafico.getContext("2d")

function addNota(){
let n=parseFloat(nota.value)
if(isNaN(n))return
notas.push(n)
draw()
}

function draw(){
ctx.clearRect(0,0,500,250)

for(let i=0;i<=10;i++){
let y=250-i*20
ctx.fillStyle="#ccc"
ctx.fillRect(0,y,500,1)
ctx.fillStyle="#000"
ctx.fillText(i,5,y-2)
}

notas.forEach((n,i)=>{
let x=i*40+40
let h=n*20
ctx.fillStyle="#5aa9e6"
ctx.fillRect(x,250-h,30,h)
ctx.fillStyle="#000"
ctx.fillText(n,x,250-h-5)
})
}

/* PROVAS COM BOTÃO DIREITO */
function addProva(){

if(!dataProva.value || !materiaProva.value) return

let li=document.createElement("li")
li.innerText=dataProva.value+" - "+materiaProva.value

li.oncontextmenu=function(e){
e.preventDefault()

let opcao=prompt("1 - Editar\n2 - Excluir")

if(opcao=="1"){
let novo=prompt("Editar:",li.innerText)
if(novo) li.innerText=novo
}

if(opcao=="2"){
li.remove()
}

}

listaProvas.appendChild(li)
}

/* ARQUIVOS */
fileInput.onchange=()=>{
let li=document.createElement("li")
li.innerText=fileInput.files[0].name
listaArquivos.appendChild(li)
}

</script>

</body>

</html>
