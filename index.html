<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#e2e8f0;
display:flex;
}

.sidebar{
width:250px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
height:100vh;
padding:20px;
position:fixed;
border-right:1px solid rgba(255,255,255,0.1);
}

.logo{
font-weight:700;
font-size:20px;
margin-bottom:30px;
}

.menu button{
display:flex;
align-items:center;
gap:10px;
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:transparent;
color:#94a3b8;
cursor:pointer;
transition:0.3s;
}

.menu button:hover, .active{
background:#2563eb;
color:white;
transform:translateX(5px);
}

.main{
margin-left:250px;
padding:30px;
width:100%;
}

.header h1{
font-size:32px;
margin-bottom:10px;
}

.header p{
color:#94a3b8;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
margin-bottom:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

button.primary{
background:linear-gradient(135deg,#2563eb,#3b82f6);
color:white;
padding:10px 16px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button.primary:hover{
transform:scale(1.05);
}

input{
padding:10px;
border-radius:10px;
border:none;
outline:none;
margin-right:10px;
background:rgba(255,255,255,0.1);
color:white;
}

.section{display:none}

.badge{
background:#22c55e;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

.progress{
height:8px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress div{
height:100%;
background:#22c55e;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">🚀 Mochila PRO</div>
<div class="menu">
<button onclick="mostrar('dashboard')" class="active">🏠 Dashboard</button>
<button onclick="mostrar('mochila')">📚 Matérias</button>
<button onclick="mostrar('metas')">🎯 Metas</button>
<button onclick="mostrar('notas')">📊 Desempenho</button>
</div>
</div>

<div class="main">
<div class="header">
<h1>Seu sistema de estudos inteligente</h1>
<p>Organize, acompanhe e evolua todos os dias</p>
</div>

<div id="dashboard" class="section">
<div class="grid">
<div class="card"><h3>📚 Matérias</h3><p id="totalMaterias">0</p></div>
<div class="card"><h3>🎯 Metas</h3><p id="totalMetas">0</p></div>
<div class="card"><h3>📊 Média</h3><p id="mediaNotas">0</p></div>
</div>
</div>

<div id="mochila" class="section">
<div class="card">
<input id="novaMateria" placeholder="Nova matéria">
<button class="primary" onclick="addMateria()">Criar</button>
</div>
<div class="grid" id="listaMaterias"></div>
</div>

<div id="metas" class="section">
<div class="card">
<input id="metaInput" placeholder="Meta (ex: tirar 9 em matemática)">
<button class="primary" onclick="addMeta()">Adicionar meta</button>
</div>
<div id="listaMetas"></div>
</div>

<div id="notas" class="section">
<div class="card">
<input id="notaInput" placeholder="Nota">
<button class="primary" onclick="addNota()">Adicionar</button>
</div>
</div>

</div>

<script>
function mostrar(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none')
document.getElementById(id).style.display='block'
}
mostrar('dashboard')

let materias = JSON.parse(localStorage.getItem('materias')||'[]')
function addMateria(){
let nome=novaMateria.value
if(!nome) return
materias.push(nome)
localStorage.setItem('materias',JSON.stringify(materias))
renderMaterias()
}

function renderMaterias(){
listaMaterias.innerHTML=''
materias.forEach(m=>{
let div=document.createElement('div')
div.className='card'
div.innerHTML=`<h3>${m}</h3><span class='badge'>Ativo</span>`
listaMaterias.appendChild(div)
})
totalMaterias.innerText=materias.length
}

let metas=[]
function addMeta(){
let m=metaInput.value
if(!m) return
metas.push(m)
renderMetas()
}

function renderMetas(){
listaMetas.innerHTML=''
metas.forEach(m=>{
let div=document.createElement('div')
div.className='card'
div.innerHTML=`<h3>${m}</h3>
<div class='progress'><div style='width:50%'></div></div>`
listaMetas.appendChild(div)
})
totalMetas.innerText=metas.length
}

let notas=[]
function addNota(){
let n=parseFloat(notaInput.value)
if(isNaN(n)) return
notas.push(n)
let media = notas.reduce((a,b)=>a+b,0)/notas.length
mediaNotas.innerText=media.toFixed(1)
}

renderMaterias()
</script>

</body>
</html>
