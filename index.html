<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Digital PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
display:flex;
background:#eef5ff;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#5aa9e6;
height:100vh;
padding:20px;
color:white;
position:fixed;
}

.sidebar button{
display:block;
width:100%;
margin:8px 0;
padding:10px;
border:none;
border-radius:8px;
background:#ffffff22;
color:white;
cursor:pointer;
}

/* MAIN */
.main{
margin-left:220px;
padding:20px;
width:100%;
}

.section{display:none}

.card{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

button{
background:#5aa9e6;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* HORÁRIO */
.tabela{
display:grid;
grid-template-columns:80px repeat(5,1fr);
gap:6px;
max-width:700px;
margin:auto;
}

.celula{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
border:1px solid #ddd;
}

.header{
background:#5aa9e6;
color:white;
font-weight:bold;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:500px;
margin:10% auto;
}

textarea{
width:100%;
height:150px;
}

canvas{
background:white;
border-radius:10px;
}

/* JOGOS */
.jogo{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
transition:0.2s;
}

.jogo:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="mostrar('mochila')">📚 Mochila</button>
<button onclick="mostrar('horario')">📅 Horário</button>
<button onclick="mostrar('notas')">📊 Notas</button>
<button onclick="mostrar('provas')">📅 Provas</button>
<button onclick="mostrar('jogos')">🎮 Jogos</button>
</div>

<div class="main">

<!-- MOCHILA -->
<div id="mochila" class="section">
<div class="card">
<input id="novaMateria" placeholder="Nova matéria">
<button onclick="criarMateria()">Adicionar</button>
</div>
<div class="grid" id="grid"></div>
</div>

<!-- HORÁRIO -->
<div id="horario" class="section">
<div class="card">
<h3>Manhã</h3>
<div id="manha" class="tabela"></div>
</div>
<div class="card">
<h3>Tarde</h3>
<div id="tarde" class="tabela"></div>
</div>
</div>

<!-- NOTAS -->
<div id="notas" class="section">
<div class="card">
<input id="nota" placeholder="Ex: 8P">
<button onclick="addNota()">Adicionar</button>
<canvas id="grafico" width="500" height="250"></canvas>
</div>
</div>

<!-- PROVAS -->
<div id="provas" class="section">
<div class="card">
<input type="date" id="dataProva">
<input id="materiaProva">
<button onclick="addProva()">Adicionar</button>
<ul id="listaProvas"></ul>
</div>
</div>

<!-- JOGOS -->
<div id="jogos" class="section">
<div class="grid">
<div class="jogo"><a href="https://www.friv.com" target="_blank">FRIV</a></div>
<div class="jogo"><a href="https://poki.com" target="_blank">Poki</a></div>
<div class="jogo"><a href="https://crazygames.com" target="_blank">CrazyGames</a></div>
</div>
</div>

</div>

<script>

/* NAV */
function mostrar(s){
document.querySelectorAll(".section").forEach(e=>e.style.display="none")
document.getElementById(s).style.display="block"
}
mostrar("mochila")

/* HORÁRIO */
let dias=["Seg","Ter","Qua","Qui","Sex"]

function tabela(id,linhas){
let div=document.getElementById(id)
div.innerHTML=""

div.innerHTML+=`<div class="celula header"></div>`
dias.forEach(d=>div.innerHTML+=`<div class="celula header">${d}</div>`)

for(let i=1;i<=linhas;i++){
div.innerHTML+=`<div class="celula header">Aula ${i}</div>`
dias.forEach((d,j)=>{
let key=id+i+j
let val=localStorage.getItem(key)||""
div.innerHTML+=`
<div contenteditable class="celula"
oninput="localStorage.setItem('${key}',this.innerText)">
${val}
</div>`
})
}
}

tabela("manha",5)
tabela("tarde",4)

/* NOTAS COM SIGLA */
let notas=[]
let labels=[]
let ctx=grafico.getContext("2d")

function addNota(){

let input = nota.value.trim()

let numero = parseFloat(input)
let sigla = input.replace(/[0-9.]/g,'')

if(isNaN(numero)) return

notas.push(numero)
labels.push(sigla)

draw()
}

function draw(){
ctx.clearRect(0,0,500,250)

/* linhas */
for(let i=0;i<=10;i++){
let y=250-i*20
ctx.fillStyle="#ccc"
ctx.fillRect(0,y,500,1)
ctx.fillStyle="#000"
ctx.fillText(i,5,y-2)
}

/* barras */
notas.forEach((n,i)=>{
let x=i*40+40
let h=n*20

ctx.fillStyle="#5aa9e6"
ctx.fillRect(x,250-h,30,h)

/* número */
ctx.fillStyle="#000"
ctx.fillText(n,x,250-h-5)

/* sigla */
ctx.fillText(labels[i],x,245)
})

}

/* PROVAS */
function addProva(){
if(!dataProva.value || !materiaProva.value) return

let li=document.createElement("li")
li.innerText=dataProva.value+" - "+materiaProva.value

li.oncontextmenu=function(e){
e.preventDefault()

let op=prompt("1 editar | 2 excluir")

if(op=="1"){
let novo=prompt("Editar:",li.innerText)
if(novo) li.innerText=novo
}

if(op=="2"){
li.remove()
}
}

listaProvas.appendChild(li)
}

</script>

</body>
</html>
