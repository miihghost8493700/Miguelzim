<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Digital Pro</title>

<style>
body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#cfe9ff,#a6d4fa);
color:#1e2a38;
}

header{
background:#8ec5f5;
padding:15px;
text-align:center;
font-size:22px;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

input,textarea{
padding:8px;
border-radius:6px;
border:none;
margin:4px;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#5aa9e6;
color:white;
cursor:pointer;
}

button:hover{
background:#3d8ed1;
}

#app{display:none;}

nav{text-align:center;margin:10px;}
nav button{margin:4px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
padding:20px;
}

.materia{
background:#e3f2fd;
border-radius:10px;
padding:12px;
}

.conteudo{
background:#d4ecff;
padding:6px;
margin-top:6px;
display:flex;
justify-content:space-between;
}

.section{display:none;padding:20px;text-align:center;}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:white;
margin:10% auto;
padding:20px;
width:90%;
max-width:500px;
border-radius:10px;
}

.modal textarea{width:100%;height:150px;}

/* HORÁRIO */
.tabela{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:5px;
}

.celula{
background:#d4ecff;
padding:8px;
border-radius:6px;
min-height:40px;
}

/* JOGOS */
.jogo{
background:#d4ecff;
padding:15px;
margin:10px;
border-radius:10px;
}

canvas{background:white;border-radius:10px;}

</style>
</head>

<body>

<div id="login">
<h2>🔒 Mochila Digital</h2>
<input type="password" id="senha">
<button onclick="entrar()">Entrar</button>
<p id="erro"></p>
</div>

<div id="app">

<header>🎒 Mochila Escolar</header>

<nav>
<button onclick="mostrar('mochila')">📚 Mochila</button>
<button onclick="mostrar('horario')">📅 Horário</button>
<button onclick="mostrar('provas')">📅 Provas</button>
<button onclick="mostrar('notas')">📊 Notas</button>
<button onclick="mostrar('jogos')">🎮 Jogos</button>
<button onclick="mostrar('arquivos')">📂 Arquivos</button>
</nav>

<!-- MOCHILA -->
<div id="mochila" class="section">
<input id="novaMateria" placeholder="Nova matéria">
<button onclick="criarMateria()">Adicionar</button>
<div class="grid" id="grid"></div>
</div>

<!-- HORÁRIO -->
<div id="horario" class="section">

<h3>🌅 Manhã (5 aulas)</h3>
<div class="tabela" id="manha"></div>

<h3>🌇 Tarde (4 aulas)</h3>
<div class="tabela" id="tarde"></div>

</div>

<!-- PROVAS -->
<div id="provas" class="section">
<input type="date" id="dataProva">
<input id="materiaProva" placeholder="Matéria">
<button onclick="addProva()">Adicionar</button>
<ul id="listaProvas"></ul>
</div>

<!-- NOTAS -->
<div id="notas" class="section">
<input id="nota">
<button onclick="addNota()">Adicionar</button>
<canvas id="grafico" width="400" height="200"></canvas>
</div>

<!-- JOGOS -->
<div id="jogos" class="section">
<div class="jogo"><a href="https://www.friv.com" target="_blank">FRIV</a></div>
<div class="jogo"><a href="https://poki.com" target="_blank">Poki</a></div>
<div class="jogo"><a href="https://crazygames.com" target="_blank">Crazy Games</a></div>
</div>

<!-- ARQUIVOS -->
<div id="arquivos" class="section">
<input type="file" id="fileInput">
<ul id="listaArquivos"></ul>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<textarea id="modalText"></textarea><br>
<button onclick="salvarModal()">Salvar</button>
<button onclick="excluirModal()">Excluir</button>
</div>
</div>

</div>

<script>

/* LOGIN */
let senhaCorreta="244m"
function entrar(){
if(senha.value===senhaCorreta){
login.style.display="none"
app.style.display="block"
mostrar("mochila")
}else{
erro.innerText="Senha incorreta"
}
}

/* NAV */
function mostrar(s){
document.querySelectorAll(".section").forEach(e=>e.style.display="none")
document.getElementById(s).style.display="block"
}

/* MATÉRIAS */
let total=parseInt(localStorage.getItem("total")||21)
let grid=document.getElementById("grid")

for(let i=1;i<=total;i++) criarMat(i)

function criarMat(i){
let nome=localStorage.getItem("nome"+i)||("Matéria "+i)
let div=document.createElement("div")
div.className="materia"

div.innerHTML=`
<h3 contenteditable oninput="localStorage.setItem('nome${i}',this.innerText)">${nome}</h3>
<button onclick="addCont(${i})">+</button>
<div id="c${i}"></div>
`

grid.appendChild(div)
render(i)
}

function render(i){
let lista=JSON.parse(localStorage.getItem("c"+i)||"[]")
let cont=document.getElementById("c"+i)
cont.innerHTML=""
lista.forEach((t,idx)=>{
let d=document.createElement("div")
d.className="conteudo"
d.innerHTML=`<span onclick="abrir(${i},${idx})">${t.substring(0,20)}</span>
<button onclick="remover(${i},${idx})">x</button>`
cont.appendChild(d)
})
}

function addCont(i){
let l=JSON.parse(localStorage.getItem("c"+i)||"[]")
l.push("")
localStorage.setItem("c"+i,JSON.stringify(l))
render(i)
}

function remover(i,idx){
let l=JSON.parse(localStorage.getItem("c"+i)||"[]")
l.splice(idx,1)
localStorage.setItem("c"+i,JSON.stringify(l))
render(i)
}

let mat,idx
function abrir(i,j){
mat=i;idx=j
let l=JSON.parse(localStorage.getItem("c"+i)||"[]")
modalText.value=l[j]
modal.style.display="block"
}

function salvarModal(){
let l=JSON.parse(localStorage.getItem("c"+mat)||"[]")
l[idx]=modalText.value
localStorage.setItem("c"+mat,JSON.stringify(l))
modal.style.display="none"
render(mat)
}

function excluirModal(){
remover(mat,idx)
modal.style.display="none"
}

/* HORÁRIO */
let dias=["Seg","Ter","Qua","Qui","Sex"]

function criarTabela(id,linhas){
let div=document.getElementById(id)
div.innerHTML=""
dias.forEach(d=>div.innerHTML+=`<div class="celula">${d}</div>`)

for(let i=1;i<=linhas;i++){
dias.forEach((d,j)=>{
let key=id+i+j
let val=localStorage.getItem(key)||""
div.innerHTML+=`<div contenteditable class="celula"
oninput="localStorage.setItem('${key}',this.innerText)">${val}</div>`
})
}
}

criarTabela("manha",5)
criarTabela("tarde",4)

/* PROVAS */
function addProva(){
let li=document.createElement("li")
li.innerText=dataProva.value+" - "+materiaProva.value
listaProvas.appendChild(li)
}

/* NOTAS */
let notas=[]
let ctx=grafico.getContext("2d")

function addNota(){
let n=parseFloat(nota.value)
if(isNaN(n))return
notas.push(n)
desenhar()
}

function desenhar(){
ctx.clearRect(0,0,400,200)

/* linhas */
for(let i=0;i<=10;i++){
ctx.fillStyle="#ccc"
ctx.fillRect(0,200-i*20,400,1)
ctx.fillStyle="black"
ctx.fillText(i,0,200-i*20)
}

/* barras */
notas.forEach((n,i)=>{
let x=i*40+30
let h=n*15
ctx.fillStyle="blue"
ctx.fillRect(x,200-h,30,h)
ctx.fillStyle="black"
ctx.fillText(n,x,200-h-5)
})
}

/* ARQUIVOS */
fileInput.onchange=()=>{
let li=document.createElement("li")
li.innerText=fileInput.files[0].name
listaArquivos.appendChild(li)
}

</script>

</body>
</html>
