<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
background:#f8fafc;
display:flex;
color:#1e293b;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#1e293b;
height:100vh;
padding:20px;
color:white;
position:fixed;
}

.logo{
font-weight:700;
font-size:18px;
margin-bottom:30px;
}

.menu button{
display:flex;
align-items:center;
gap:10px;
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:transparent;
color:#cbd5f5;
cursor:pointer;
transition:0.2s;
}

.menu button:hover, .active{
background:#2563eb;
color:white;
}

/* MAIN */
.main{
margin-left:240px;
padding:30px;
width:100%;
}

.header{
margin-bottom:25px;
}

.header h1{
font-size:28px;
margin-bottom:5px;
}

.header p{
color:#64748b;
}

/* CARDS */
.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

button.primary{
background:#2563eb;
color:white;
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
}

button.primary:hover{
background:#1d4ed8;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #e2e8f0;
margin-right:10px;
}

.section{display:none}

.badge{
background:#e0f2fe;
color:#0369a1;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">🎒 Mochila PRO</div>

<div class="menu">
<button onclick="mostrar('dashboard')" class="active">🏠 Dashboard</button>
<button onclick="mostrar('mochila')">📚 Matérias</button>
<button onclick="mostrar('notas')">📊 Desempenho</button>
<button onclick="mostrar('provas')">📅 Provas</button>
<button onclick="mostrar('arquivos')">📂 Arquivos</button>
</div>
</div>

<div class="main">

<div class="header">
<h1>Organize seus estudos como um profissional</h1>
<p>Gerencie matérias, provas e desempenho em um só lugar</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<div class="grid">
<div class="card"><h3>📚 Matérias</h3><p id="totalMaterias">0</p></div>
<div class="card"><h3>📅 Provas</h3><p id="totalProvas">0</p></div>
<div class="card"><h3>📊 Média</h3><p id="mediaNotas">0</p></div>
</div>
</div>

<!-- MOCHILA -->
<div id="mochila" class="section">
<div class="card">
<input id="novaMateria" placeholder="Ex: Matemática">
<button class="primary" onclick="addMateria()">➕ Criar matéria</button>
</div>
<div class="grid" id="listaMaterias"></div>
</div>

<!-- NOTAS -->
<div id="notas" class="section">
<div class="card">
<input id="notaInput" placeholder="Nota">
<button class="primary" onclick="addNota()">➕ Adicionar nota</button>
<p id="media"></p>
</div>
</div>

<!-- PROVAS -->
<div id="provas" class="section">
<div class="card">
<input type="date" id="data">
<input id="materia">
<button class="primary" onclick="addProva()">➕ Adicionar prova</button>
<ul id="lista"></ul>
</div>
</div>

<!-- ARQUIVOS -->
<div id="arquivos" class="section">
<div class="card">
<input type="file" id="file">
<ul id="files"></ul>
</div>
</div>

</div>

<script>
function mostrar(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none')
document.getElementById(id).style.display='block'
}
mostrar('dashboard')

/* MATÉRIAS */
let materias = JSON.parse(localStorage.getItem('materias')||'[]')

function addMateria(){
let nome = novaMateria.value
if(!nome) return
materias.push(nome)
localStorage.setItem('materias',JSON.stringify(materias))
renderMaterias()
}

function renderMaterias(){
listaMaterias.innerHTML=''
materias.forEach(m=>{
let div=document.createElement('div')
div.className='card'
div.innerHTML=`<h3>${m}</h3><span class='badge'>Matéria</span>`
listaMaterias.appendChild(div)
})

totalMaterias.innerText = materias.length
}

/* NOTAS */
let notas = []
function addNota(){
let n = parseFloat(notaInput.value)
if(isNaN(n)) return
notas.push(n)
let media = notas.reduce((a,b)=>a+b,0)/notas.length
mediaNotas.innerText = media.toFixed(1)
}

/* PROVAS */
let provas = []
function addProva(){
if(!data.value || !materia.value) return
let p = `${data.value} - ${materia.value}`
provas.push(p)
let li=document.createElement('li')
li.innerText=p
lista.appendChild(li)

totalProvas.innerText = provas.length
}

/* FILES */
file.onchange = ()=>{
let li=document.createElement('li')
li.innerText=file.files[0].name
files.appendChild(li)
}

renderMaterias()
</script>

</body>
</html>
