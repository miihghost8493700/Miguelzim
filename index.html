<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Digital PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
display:flex;
background:#eef5ff;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#5aa9e6;
height:100vh;
padding:20px;
color:white;
position:fixed;
}

.sidebar button{
display:block;
width:100%;
margin:8px 0;
padding:10px;
border:none;
border-radius:8px;
background:#ffffff22;
color:white;
cursor:pointer;
}

/* MAIN */
.main{
margin-left:220px;
padding:20px;
width:100%;
}

.section{display:none}

/* CARD */
.card{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

/* BOTÕES */
button{
background:#5aa9e6;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* HORÁRIO */
.tabela{
display:grid;
grid-template-columns:80px repeat(5,1fr);
gap:6px;
max-width:700px;
margin:auto;
}

.celula{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
border:1px solid #ddd;
}

.header{
background:#5aa9e6;
color:white;
font-weight:bold;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:500px;
margin:10% auto;
}

textarea{
width:100%;
height:150px;
}

canvas{
background:white;
border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="mostrar('mochila')">📚 Mochila</button>
<button onclick="mostrar('horario')">📅 Horário</button>
<button onclick="mostrar('notas')">📊 Notas</button>
<button onclick="mostrar('provas')">📅 Provas</button>
</div>

<div class="main">

<!-- MOCHILA -->
<div id="mochila" class="section">
<div class="card">
<input id="novaMateria" placeholder="Nova matéria">
<button onclick="criarMateria()">Adicionar</button>
</div>
<div class="grid" id="grid"></div>
</div>

<!-- HORÁRIO -->
<div id="horario" class="section">
<div class="card">
<h3>Manhã</h3>
<div id="manha" class="tabela"></div>
</div>
<div class="card">
<h3>Tarde</h3>
<div id="tarde" class="tabela"></div>
</div>
</div>

<!-- NOTAS -->
<div id="notas" class="section">
<div class="card">
<input id="nota">
<button onclick="addNota()">Adicionar</button>
<canvas id="grafico" width="500" height="250"></canvas>
</div>
</div>

<!-- PROVAS -->
<div id="provas" class="section">
<div class="card">
<input type="date" id="dataProva">
<input id="materiaProva">
<button onclick="addProva()">Adicionar</button>
<ul id="listaProvas"></ul>
</div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<textarea id="modalText"></textarea><br>
<button onclick="salvarModal()">Salvar</button>
<button onclick="excluirModal()">Excluir</button>
</div>
</div>

<script>

/* NAV */
function mostrar(s){
document.querySelectorAll(".section").forEach(e=>e.style.display="none")
document.getElementById(s).style.display="block"
}
mostrar("mochila")

/* ================= MOCHILA (SEU CÓDIGO) ================= */

let grid = document.getElementById("grid")
let total = parseInt(localStorage.getItem("total") || 0)

for(let i = 1; i <= total; i++){
  criarMateriaHTML(i)
}

function criarMateria(){
let nome = document.getElementById("novaMateria").value.trim()
if(nome === "") return

total++
localStorage.setItem("total", total)
localStorage.setItem("nome"+total, nome)

criarMateriaHTML(total)
document.getElementById("novaMateria").value = ""
}

function criarMateriaHTML(i){
let nome = localStorage.getItem("nome"+i) || "Matéria"

let div = document.createElement("div")
div.className = "card"

div.innerHTML = `
<h3 contenteditable oninput="salvarNome(${i}, this)">${nome}</h3>
<button onclick="addConteudo(${i})">➕ Conteúdo</button>
<div id="c${i}"></div>
`

grid.appendChild(div)
renderConteudos(i)
}

function salvarNome(i, el){
localStorage.setItem("nome"+i, el.innerText)
}

function renderConteudos(i){
let lista = JSON.parse(localStorage.getItem("conteudos"+i) || "[]")
let container = document.getElementById("c"+i)
container.innerHTML = ""

lista.forEach((texto, index)=>{
let preview = texto.length > 25 ? texto.substring(0,25)+"..." : (texto || "Novo conteúdo")

let div = document.createElement("div")
div.className = "card"
div.style.marginTop = "6px"
div.style.padding = "6px"
div.style.cursor = "pointer"

div.innerText = preview
div.onclick = () => abrirModal(i, index)

container.appendChild(div)
})
}

function addConteudo(i){
let lista = JSON.parse(localStorage.getItem("conteudos"+i) || "[]")
lista.push("")
localStorage.setItem("conteudos"+i, JSON.stringify(lista))
renderConteudos(i)
}

/* MODAL */
let modal = document.getElementById("modal")
let modalText = document.getElementById("modalText")

let materiaAtual = 0
let indexAtual = 0

function abrirModal(i, index){
materiaAtual = i
indexAtual = index
let lista = JSON.parse(localStorage.getItem("conteudos"+i) || "[]")
modalText.value = lista[index]
modal.style.display = "block"
}

function salvarModal(){
let lista = JSON.parse(localStorage.getItem("conteudos"+materiaAtual) || "[]")
lista[indexAtual] = modalText.value
localStorage.setItem("conteudos"+materiaAtual, JSON.stringify(lista))
modal.style.display = "none"
renderConteudos(materiaAtual)
}

function excluirModal(){
let lista = JSON.parse(localStorage.getItem("conteudos"+materiaAtual) || "[]")
lista.splice(indexAtual, 1)
localStorage.setItem("conteudos"+materiaAtual, JSON.stringify(lista))
modal.style.display = "none"
renderConteudos(materiaAtual)
}

/* ================= HORÁRIO ================= */

let dias=["Seg","Ter","Qua","Qui","Sex"]

function tabela(id,linhas){
let div=document.getElementById(id)
div.innerHTML=""

div.innerHTML+=`<div class="celula header"></div>`
dias.forEach(d=>div.innerHTML+=`<div class="celula header">${d}</div>`)

for(let i=1;i<=linhas;i++){
div.innerHTML+=`<div class="celula header">Aula ${i}</div>`
dias.forEach((d,j)=>{
let key=id+i+j
let val=localStorage.getItem(key)||""
div.innerHTML+=`
<div contenteditable class="celula"
oninput="localStorage.setItem('${key}',this.innerText)">
${val}
</div>`
})
}
}

tabela("manha",5)
tabela("tarde",4)

/* ================= NOTAS ================= */

let notas=[]
let ctx=grafico.getContext("2d")

function addNota(){
let n=parseFloat(nota.value)
if(isNaN(n)) return
notas.push(n)
draw()
}

function draw(){
ctx.clearRect(0,0,500,250)

for(let i=0;i<=10;i++){
let y=250-i*20
ctx.fillStyle="#ccc"
ctx.fillRect(0,y,500,1)
ctx.fillStyle="#000"
ctx.fillText(i,5,y-2)
}

notas.forEach((n,i)=>{
let x=i*40+40
let h=n*20
ctx.fillStyle="#5aa9e6"
ctx.fillRect(x,250-h,30,h)
ctx.fillStyle="#000"
ctx.fillText(n,x,250-h-5)
})
}

/* ================= PROVAS ================= */

function addProva(){
if(!dataProva.value || !materiaProva.value) return

let li=document.createElement("li")
li.innerText=dataProva.value+" - "+materiaProva.value

li.oncontextmenu=function(e){
e.preventDefault()

let op=prompt("1 editar | 2 excluir")

if(op=="1"){
let novo=prompt("Editar:",li.innerText)
if(novo) li.innerText=novo
}

if(op=="2"){
li.remove()
}
}

listaProvas.appendChild(li)
}

</script>
</body>
</html>
